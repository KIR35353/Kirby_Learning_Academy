services:
  postgres:
    image: postgres:16-alpine
    container_name: kla_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kla
      POSTGRES_PASSWORD: kla_dev_password
      POSTGRES_DB: kla_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kla -d kla_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kla_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: kla_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kla_minio
      MINIO_ROOT_PASSWORD: kla_minio_dev
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket init — creates the default bucket on first start
  minio_init:
    image: minio/mc:latest
    container_name: kla_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 kla_minio kla_minio_dev &&
        mc mb --ignore-existing local/kirby-learning-academy-dev &&
        mc anonymous set download local/kirby-learning-academy-dev/public
      "

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: kla_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: kla_meili_dev_key
      MEILI_ENV: development
    ports:
      - "7700:7700"   # API + dashboard → http://localhost:7700
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
